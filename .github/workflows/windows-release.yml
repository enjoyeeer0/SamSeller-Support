name: Windows Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --console --name "SamSeller-Support" Main.py

      - name: Prepare release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/SamSeller-Support.exe" "release/SamSeller-Support.exe"
          Copy-Item "README.md" "release/README.md"
          Copy-Item "secrets.example.json" "release/secrets.example.json"
          if (Test-Path "QUICK_START_RU.txt") {
            Copy-Item "QUICK_START_RU.txt" "release/QUICK_START_RU.txt"
          }
          Compress-Archive -Path release/* -DestinationPath "SamSeller-Support-windows-x64.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SamSeller-Support-windows-x64
          path: SamSeller-Support-windows-x64.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SamSeller-Support-windows-x64.zip
          generate_release_notes: true
